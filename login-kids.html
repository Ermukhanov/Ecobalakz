<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoBala Kids — Вход</title>
<link rel="icon" href="iconcakids.jpg" type="image/jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
<style>
  /* ── Казахский шрифт фикс ───────────────────────────────────────────
     Noto Sans покрывает казахские буквы: Ә Ғ Қ Ң Ө Ұ Ү І
     unicode-range заставляет браузер использовать Noto Sans ТОЛЬКО
     для символов которых нет в Nunito (казахский расширенный кириллица)
  ─────────────────────────────────────────────────────────────────── */
  @font-face {
    font-family: 'KazFont';
    src: local('Noto Sans');
    unicode-range: U+0400-045F, U+04D9, U+04E9, U+04B1, U+04A3, U+04BB,
                   U+049B, U+04A2, U+04E8, U+04B0, U+0456, U+04AF, U+049A,
                   U+04BA, U+04D8; /* казахский кириллический диапазон */
  }
  /* Глобальный стек: сначала Nunito (латиница/цифры), потом Noto Sans (казахский) */
  *, body, input, textarea, select, button, span, div, p, h1, h2, h3, h4, h5, h6, a, li {
    font-family: 'Nunito', 'Noto Sans', 'Segoe UI', system-ui, -apple-system, sans-serif !important;
  }

*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Nunito','Noto Sans',sans-serif;
  min-height:100vh;background:#EFF8FF;
  display:flex;align-items:center;justify-content:center;
  padding:20px;overflow:hidden;position:relative;
}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.b1{width:500px;height:500px;background:rgba(74,163,223,0.11);top:-150px;right:-100px;}
.b2{width:350px;height:350px;background:rgba(14,165,233,0.09);bottom:-100px;left:-80px;}
.wrap{width:100%;max-width:420px;position:relative;z-index:1;}
.hdr{text-align:center;margin-bottom:24px;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:14px;}
.logo-img{width:50px;height:50px;border-radius:14px;object-fit:cover;box-shadow:0 4px 14px rgba(21,101,192,0.25);}
.logo-name{font-size:21px;font-weight:900;color:#1565C0;}
.h-title{font-size:25px;font-weight:900;color:#0f172a;margin-bottom:4px;}
.h-sub{font-size:14px;color:#64748b;font-weight:600;}
.card{background:#fff;border-radius:24px;padding:30px 26px;box-shadow:0 8px 40px rgba(74,163,223,0.13);border:1.5px solid rgba(74,163,223,0.1);}
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:20px;}
.lsw{display:flex;background:#E3F2FD;border-radius:20px;padding:3px;}
.lbtn{padding:5px 14px;border-radius:17px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#1565C0;transition:all 0.2s;}
.lbtn.on{background:#1565C0;color:#fff;box-shadow:0 2px 8px rgba(21,101,192,0.25);}
.fg{margin-bottom:16px;}
.fl{display:block;font-size:13px;font-weight:800;color:#0f172a;margin-bottom:7px;}
.iw{position:relative;}
.ii{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.fi{
  width:100%;padding:12px 14px 12px 42px;border-radius:12px;border:2px solid #e2e8f0;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:#0f172a;
  background:#f8fafc;outline:none;transition:all 0.2s;
}
.fi:focus{border-color:#4AA3DF;background:#fff;box-shadow:0 0 0 3px rgba(74,163,223,0.1);}
.eyeb{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#94a3b8;}
.msg{border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:none;}
.msg.err{background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2;}
.msg.ok{background:#E8F5E9;color:#2E7D32;border:1px solid #C8E6C9;}
.sbtn{
  width:100%;padding:14px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#1565C0,#1E88E5);
  color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:all 0.2s;margin-top:6px;
  box-shadow:0 4px 16px rgba(21,101,192,0.22);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(21,101,192,0.3);}
.sbtn:active{transform:translateY(0);}
.sbtn .sp{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.sbtn.ld .bt{display:none;}.sbtn.ld .sp{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.dvd{text-align:center;font-size:12px;color:#94a3b8;margin:16px 0;font-weight:700;display:flex;align-items:center;gap:8px;}
.dvd::before,.dvd::after{content:'';flex:1;height:1px;background:#e2e8f0;}
.rl{text-align:center;font-size:14px;color:#64748b;font-weight:600;}
.rl a{color:#1565C0;font-weight:800;text-decoration:none;}
.rl a:hover{text-decoration:underline;}
.bl{text-align:center;margin-top:16px;}
.bl a{font-size:13px;color:#64748b;text-decoration:none;font-weight:700;}
.bl a:hover{color:#1565C0;}
@media(max-width:400px){.card{padding:22px 16px;}}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="wrap">
  <div class="hdr">
    <div class="logo-row">
      <img src="iconcakids.jpg" class="logo-img" alt="Kids">
      <span class="logo-name">EcoBala Kids</span>
    </div>
    <div class="h-title" id="hTitle">Вход в Kids</div>
    <div class="h-sub" id="hSub">Для детей 5–12 лет</div>
  </div>
  <div class="card">
    <div class="lang-bar">
      <div class="lsw">
        <button class="lbtn on" data-l="ru">РУС</button>
        <button class="lbtn" data-l="kz">ҚАЗ</button>
      </div>
    </div>
    <div class="msg err" id="eMsg"></div>
    <div class="msg ok" id="oMsg"></div>
    <form id="form">
      <div class="fg">
        <label class="fl" id="lEmail">Email родителя</label>
        <div class="iw">
          <span class="ii">📧</span>
          <input class="fi" id="iEmail" type="email" name="email" autocomplete="email" placeholder="example@mail.com" required>
        </div>
      </div>
      <div class="fg">
        <label class="fl" id="lPass">Пароль</label>
        <div class="iw">
          <span class="ii">🔑</span>
          <input class="fi" id="iPass" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" class="eyeb" onclick="togglePw()">👁</button>
        </div>
      </div>
      <button type="submit" class="sbtn" id="sbtn">
        <span class="bt" id="bTxt">Войти →</span>
        <div class="sp"></div>
      </button>
    </form>
    <div class="dvd" id="dOr">или</div>
    <div class="rl"><span id="noAcc">Нет аккаунта?</span> <a href="register-kids.html" id="rLink">Зарегистрироваться</a></div>
  </div>
  <div class="bl"><a href="index.html" id="bLink">← На главную</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase2.js"></script>
<script>
const T={
  ru:{title:'Вход в Kids',sub:'Для детей 5–12 лет',email:'Email родителя',pass:'Пароль',btn:'Войти →',or:'или',noAcc:'Нет аккаунта?',reg:'Зарегистрироваться',back:'← На главную',eEmpty:'Введите email и пароль.',eRole:'Этот аккаунт зарегистрирован как Teen.',eWrong:'Неверный email или пароль.',ok:'Добро пожаловать! ✅'},
  kz:{title:'Kids-ке кіру',sub:'5–12 жастағы балалар үшін',email:'Ата-анасының email',pass:'Құпиясөз',btn:'Кіру →',or:'немесе',noAcc:'Аккаунт жоқ па?',reg:'Тіркелу',back:'← Басты бетке',eEmpty:'Email мен құпиясөзді енгізіңіз.',eRole:'Бұл аккаунт Teen ретінде тіркелген.',eWrong:'Қате email немесе құпиясөз.',ok:'Қош келдіңіз! ✅'}
};
let lang=localStorage.getItem('selectedLanguage')||'ru';
function setLang(l){
  lang=l;localStorage.setItem('selectedLanguage',l);
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  const t=T[l];
  document.getElementById('hTitle').textContent=t.title;
  document.getElementById('hSub').textContent=t.sub;
  document.getElementById('lEmail').textContent=t.email;
  document.getElementById('lPass').textContent=t.pass;
  document.getElementById('bTxt').textContent=t.btn;
  document.getElementById('dOr').textContent=t.or;
  document.getElementById('noAcc').textContent=t.noAcc;
  document.getElementById('rLink').textContent=t.reg;
  document.getElementById('bLink').textContent=t.back;
}
document.querySelectorAll('.lbtn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.l)));
setLang(lang);
function togglePw(){const i=document.getElementById('iPass'),b=document.querySelector('.eyeb');i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈';}
function se(m){const e=document.getElementById('eMsg');e.textContent=m;e.style.display='block';document.getElementById('oMsg').style.display='none';}
function so(m){const e=document.getElementById('oMsg');e.textContent=m;e.style.display='block';document.getElementById('eMsg').style.display='none';}
document.getElementById('form').addEventListener('submit',async function(e){
  e.preventDefault();
  const t=T[lang],email=document.getElementById('iEmail').value.trim(),pass=document.getElementById('iPass').value;
  if(!email||!pass){se(t.eEmpty);return;}
  const btn=document.getElementById('sbtn');btn.classList.add('ld');
  document.getElementById('eMsg').style.display='none';document.getElementById('oMsg').style.display='none';
  try{
    const user=await EcoBalaAuth.login(email,pass);
    if(user.role==='teen'){se(t.eRole);btn.classList.remove('ld');return;}
    if(user.role!=='kids'){se(t.eRole);btn.classList.remove('ld');return;}
    so(t.ok);
    setTimeout(()=>window.location.href='kids.html',600);
  }catch(err){se(t.eWrong);btn.classList.remove('ld');}
});
(async function(){try{if(typeof EcoBalaAuth!=='undefined'){const u=await EcoBalaAuth.getCurrentUser();if(u&&u.role==='kids')window.location.replace('kids.html');}}catch{}})();
</script>
</body>
</html>
