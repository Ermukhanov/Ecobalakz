<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoBala — Вход</title>
<link rel="icon" href="iconca.jpg" type="image/jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans:wght@400;600;700;800&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito','Noto Sans',sans-serif;min-height:100vh;background:#F0FBF0;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.b1{width:500px;height:500px;background:rgba(46,125,50,0.09);top:-150px;right:-100px;}
.b2{width:350px;height:350px;background:rgba(67,160,71,0.07);bottom:-100px;left:-80px;}
.wrap{width:100%;max-width:420px;position:relative;z-index:1;}
.hdr{text-align:center;margin-bottom:24px;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:14px;}
.logo-img{width:48px;height:48px;border-radius:13px;object-fit:cover;box-shadow:0 4px 14px rgba(46,125,50,0.2);}
.logo-name{font-size:21px;font-weight:900;color:#1B5E20;}
.h-title{font-size:22px;font-weight:900;color:#0f172a;margin-bottom:5px;}
.h-sub{font-size:14px;color:#64748b;font-weight:600;}
.card{background:#fff;border-radius:24px;padding:28px 24px;box-shadow:0 8px 40px rgba(46,125,50,0.1);border:1.5px solid rgba(46,125,50,0.1);}
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:20px;}
.lsw{display:flex;background:#E8F5E9;border-radius:20px;padding:3px;}
.lb{padding:5px 14px;border-radius:17px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#1B5E20;transition:all .2s;}
.lb.on{background:#2E7D32;color:#fff;}
.platform-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.pbtn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 12px;border-radius:16px;text-decoration:none;transition:all .2s;border:2px solid transparent;}
.pbtn:hover{transform:translateY(-2px);}
.pbtn-kids{background:linear-gradient(160deg,#E3F2FD,#BBDEFB);border-color:#90CAF9;}
.pbtn-kids:hover{border-color:#1565C0;}
.pbtn-teen{background:linear-gradient(160deg,#E8F5E9,#C8E6C9);border-color:#A5D6A7;}
.pbtn-teen:hover{border-color:#2E7D32;}
.pbtn-img{width:44px;height:44px;border-radius:11px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.pbtn-label{font-size:13px;font-weight:800;}
.pbtn-kids .pbtn-label{color:#1565C0;}
.pbtn-teen .pbtn-label{color:#1B5E20;}
.pbtn-sub{font-size:11px;color:#64748b;font-weight:600;}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:12px;color:#94a3b8;font-weight:700;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0;}
.teacher-btn{display:block;width:100%;padding:13px;border-radius:14px;background:#F1F8F2;border:1.5px solid #C8E6C9;color:#1B5E20;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;text-align:center;text-decoration:none;transition:all .2s;cursor:pointer;}
.teacher-btn:hover{background:#E8F5E9;border-color:#A5D6A7;}
.back-row{text-align:center;margin-top:16px;}
.back-row a{font-size:13px;color:#64748b;text-decoration:none;font-weight:700;}
@media(max-width:400px){.card{padding:22px 16px;}}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="wrap">
  <div class="hdr">
    <div class="logo-row">
      <img src="iconca.jpg" class="logo-img" alt="EcoBala">
      <span class="logo-name">EcoBala</span>
    </div>
    <div class="h-title" id="hTitle">Войти в платформу</div>
    <div class="h-sub" id="hSub">Выберите свою роль</div>
  </div>
  <div class="card">
    <div class="lang-bar">
      <div class="lsw">
        <button class="lb on" data-l="ru">РУС</button>
        <button class="lb" data-l="kz">ҚАЗ</button>
      </div>
    </div>
    <div class="platform-btns">
      <a href="login-kids.html" class="pbtn pbtn-kids">
        <img src="iconcakids.jpg" class="pbtn-img" alt="Kids">
        <span class="pbtn-label">Kids</span>
        <span class="pbtn-sub" id="kAge">6–12 лет</span>
      </a>
      <a href="login-teen.html" class="pbtn pbtn-teen">
        <img src="iconcateen.jpg" class="pbtn-img" alt="Teen">
        <span class="pbtn-label">Teen</span>
        <span class="pbtn-sub" id="tAge">13–18 лет</span>
      </a>
    </div>
    <div class="divider" id="orText">или</div>
    <a href="teacher.html" class="teacher-btn" id="teacherBtn">👩‍🏫 Учительская панель</a>
  </div>
  <div class="back-row"><a href="index.html" id="backLink">← На главную</a></div>
</div>
<script>
const T={
  ru:{title:'Войти в платформу',sub:'Выберите свою роль',kAge:'6–12 лет',tAge:'13–18 лет',or:'или',teacher:'👩‍🏫 Учительская панель',back:'← На главную'},
  kz:{title:'Платформаға кіру',sub:'Өзіңіздің рөліңізді таңдаңыз',kAge:'6–12 жас',tAge:'13–18 жас',or:'немесе',teacher:'👩‍🏫 Мұғалімдер панелі',back:'← Басты бетке'}
};
let lang=localStorage.getItem('selectedLanguage')||'ru';
function setLang(l){
  lang=l;localStorage.setItem('selectedLanguage',l);
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  const t=T[l];
  document.getElementById('hTitle').textContent=t.title;
  document.getElementById('hSub').textContent=t.sub;
  document.getElementById('kAge').textContent=t.kAge;
  document.getElementById('tAge').textContent=t.tAge;
  document.getElementById('orText').textContent=t.or;
  document.getElementById('teacherBtn').textContent=t.teacher;
  document.getElementById('backLink').textContent=t.back;
}
document.querySelectorAll('.lb').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.l)));
setLang(lang);
</script>
</body>
</html>
