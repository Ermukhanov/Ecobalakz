<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoBala Teen — Регистрация</title>
<link rel="icon" href="iconcateen.jpg" type="image/jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
<style>
  /* ── Казахский шрифт фикс ───────────────────────────────────────────
     Noto Sans покрывает казахские буквы: Ә Ғ Қ Ң Ө Ұ Ү І
     unicode-range заставляет браузер использовать Noto Sans ТОЛЬКО
     для символов которых нет в Nunito (казахский расширенный кириллица)
  ─────────────────────────────────────────────────────────────────── */
  @font-face {
    font-family: 'KazFont';
    src: local('Noto Sans');
    unicode-range: U+0400-045F, U+04D9, U+04E9, U+04B1, U+04A3, U+04BB,
                   U+049B, U+04A2, U+04E8, U+04B0, U+0456, U+04AF, U+049A,
                   U+04BA, U+04D8; /* казахский кириллический диапазон */
  }
  /* Глобальный стек: сначала Nunito (латиница/цифры), потом Noto Sans (казахский) */
  *, body, input, textarea, select, button, span, div, p, h1, h2, h3, h4, h5, h6, a, li {
    font-family: 'Nunito', 'Noto Sans', 'Segoe UI', system-ui, -apple-system, sans-serif !important;
  }

*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Nunito','Noto Sans',sans-serif;background:#EDFBF3;min-height:100vh;padding:20px;position:relative;overflow-x:hidden;}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.b1{width:500px;height:500px;background:rgba(39,174,96,0.1);top:-150px;right:-100px;}
.b2{width:350px;height:350px;background:rgba(46,204,113,0.08);bottom:-100px;left:-80px;}
.wrap{max-width:600px;margin:0 auto;position:relative;z-index:1;padding-bottom:40px;}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px;}
.logo-row{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-img{width:38px;height:38px;border-radius:10px;object-fit:cover;}
.logo-name{font-size:17px;font-weight:900;color:#1B5E20;}
.back-a{font-size:14px;font-weight:700;color:#64748b;text-decoration:none;}
.back-a:hover{color:#16a34a;}
.card-title-block{text-align:center;margin-bottom:24px;}
.ct{font-size:24px;font-weight:900;color:#0f172a;margin-bottom:5px;}
.cs{font-size:14px;color:#64748b;font-weight:600;}
.card{background:#fff;border-radius:24px;padding:28px 24px;box-shadow:0 8px 40px rgba(39,174,96,0.11);border:1.5px solid rgba(39,174,96,0.1);}
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:20px;}
.lsw{display:flex;background:#D1FAE5;border-radius:20px;padding:3px;}
.lbtn{padding:5px 14px;border-radius:17px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#166534;transition:all 0.2s;}
.lbtn.on{background:#16a34a;color:#fff;box-shadow:0 2px 8px rgba(22,163,74,0.25);}
.sec-label{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin:20px 0 12px;padding-left:2px;}
.fg{margin-bottom:14px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:480px){.fg2{grid-template-columns:1fr;}}
.fl{display:block;font-size:12px;font-weight:800;color:#0f172a;margin-bottom:6px;}
.fi,.fsel{
  width:100%;padding:11px 14px;border-radius:11px;border:2px solid #e2e8f0;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:#0f172a;
  background:#f8fafc;outline:none;transition:all 0.2s;
}
.fi:focus,.fsel:focus{border-color:#27AE60;background:#fff;box-shadow:0 0 0 3px rgba(39,174,96,0.1);}
.iw{position:relative;}
.fi.ic{padding-left:38px;}
.ii{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.eyeb{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:#94a3b8;}
.consent-row{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#475569;line-height:1.6;margin-bottom:18px;}
.consent-row input[type=checkbox]{width:17px;height:17px;margin-top:2px;flex-shrink:0;accent-color:#16a34a;cursor:pointer;}
.consent-row a{color:#16a34a;font-weight:700;text-decoration:none;}
.msg{border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:none;line-height:1.5;}
.msg.err{background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2;}
.msg.ok{background:#E8F5E9;color:#2E7D32;border:1px solid #C8E6C9;}
.sbtn{
  width:100%;padding:14px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#1B5E20,#27AE60);color:#fff;
  font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(39,174,96,0.22);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(39,174,96,0.3);}
.sbtn:disabled{opacity:.65;cursor:not-allowed;transform:none;}
.sbtn .sp{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.sbtn.ld .bt{display:none;}.sbtn.ld .sp{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.login-link{text-align:center;margin-top:18px;font-size:14px;color:#64748b;font-weight:600;}
.login-link a{color:#16a34a;font-weight:800;text-decoration:none;}
.login-link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="wrap">
  <div class="page-header">
    <a href="index.html" class="logo-row">
      <img src="iconcateen.jpg" class="logo-img" alt="Teen">
      <span class="logo-name">EcoBala Teen</span>
    </a>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="lsw">
        <button class="lbtn on" data-l="ru">РУС</button>
        <button class="lbtn" data-l="kz">ҚАЗ</button>
      </div>
      <a href="register.html" class="back-a" id="backA">← Назад</a>
    </div>
  </div>

  <div class="card-title-block">
    <div class="ct" id="ct">Регистрация в Teen</div>
    <div class="cs" id="cs">Создайте аккаунт для подростков 13–18 лет</div>
  </div>

  <div class="card">
    <div class="lang-bar">
      <div class="lsw" style="display:none"><!-- lang in header --></div>
    </div>
    <div class="msg err" id="eMsg"></div>
    <div class="msg ok" id="oMsg"></div>

    <form id="regForm">
      <!-- Личные данные -->
      <div class="sec-label" id="secPers">🧑 Личные данные</div>
      <div class="fg2">
        <div class="fg">
          <label class="fl" id="lFName">Полное имя</label>
          <input class="fi" id="fullName" name="fullName" type="text" required placeholder="Данияр Ахметов">
        </div>
        <div class="fg">
          <label class="fl" id="lNick">Никнейм</label>
          <input class="fi" id="nickname" name="nickname" type="text" maxlength="20" required placeholder="eco_teen">
        </div>
      </div>
      <div class="fg2">
        <div class="fg">
          <label class="fl" id="lAge">Возраст</label>
          <input class="fi" id="age" name="age" type="number" min="13" max="18" required placeholder="15">
        </div>
        <div class="fg">
          <label class="fl" id="lPhone">Телефон</label>
          <input class="fi" id="phone" name="phone" type="tel" placeholder="+7 777 000 0000">
        </div>
      </div>

      <!-- Школа -->
      <div class="sec-label" id="secSchool">🏫 Учёба</div>
      <div class="fg2">
        <div class="fg">
          <label class="fl" id="lSchool">Школа</label>
          <select class="fsel" id="school" name="school" required>
            <option value="" id="selSchool">Выберите школу</option>
            <option value="2">№2 Гимназия</option>
            <option value="5">№5 Гимназия</option>
            <option value="6">№6 Гимназия</option>
            <option value="1">№1 Средняя школа</option>
            <option value="3">№3 Средняя школа</option>
            <option value="4">№4 Средняя школа</option>
            <option value="7">№7 Средняя школа</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl" id="lClass">Класс</label>
          <select class="fsel" id="class" name="class" required>
            <option value="" id="selClass">Выберите класс</option>
            <option value="7">7 класс</option>
            <option value="8">8 класс</option>
            <option value="9">9 класс</option>
            <option value="10">10 класс</option>
            <option value="11">11 класс</option>
          </select>
        </div>
      </div>

      <!-- Аккаунт -->
      <div class="sec-label" id="secAcc">📧 Аккаунт</div>
      <div class="fg">
        <label class="fl" id="lEmail">Email</label>
        <div class="iw">
          <span class="ii">📧</span>
          <input class="fi ic" id="email" name="email" type="email" required autocomplete="email" placeholder="example@mail.com">
        </div>
      </div>
      <div class="fg2">
        <div class="fg">
          <label class="fl" id="lPass">Пароль</label>
          <div class="iw">
            <input class="fi ic" name="password" type="password" autocomplete="new-password" required placeholder="Минимум 6 символов">
            <button type="button" class="eyeb" onclick="togglePw(this)">👁</button>
          </div>
        </div>
        <div class="fg">
          <label class="fl" id="lPass2">Подтвердите пароль</label>
          <div class="iw">
            <input class="fi ic" name="confirm_password" type="password" autocomplete="new-password" required placeholder="Повторите пароль">
            <button type="button" class="eyeb" onclick="togglePw(this)">👁</button>
          </div>
        </div>
      </div>

      <label class="consent-row">
        <input type="checkbox" name="terms" required>
        <span id="consentText">Я согласен(на) с <a href="privacy.html" target="_blank">Политикой конфиденциальности</a> и <a href="terms.html" target="_blank">Условиями использования</a></span>
      </label>

      <button type="submit" class="sbtn" id="sbtn">
        <span class="bt" id="bTxt">Зарегистрироваться</span>
        <div class="sp"></div>
      </button>
    </form>

    <div class="login-link">
      <span id="haveAcc">Уже есть аккаунт?</span>
      <a href="login-teen.html" id="loginLnk"> Войти как Teen</a>
    </div>
  </div>
</div>

<script>
const T = {
  ru:{ct:'Регистрация в Teen',cs:'Создайте аккаунт для подростков 13–18 лет',secPers:'🧑 Личные данные',secSchool:'🏫 Учёба',secAcc:'📧 Аккаунт',fname:'Полное имя',nick:'Никнейм',age:'Возраст',phone:'Телефон',school:'Школа',cls:'Класс',selSch:'Выберите школу',selCls:'Выберите класс',email:'Email',pass:'Пароль',pass2:'Подтвердите пароль',btn:'Зарегистрироваться',haveAcc:'Уже есть аккаунт?',login:' Войти как Teen',back:'← Назад',errPw:'Пароли не совпадают.',errConsent:'Подтвердите согласие.',errShort:'Пароль минимум 6 символов.',errRate:'Слишком много попыток. Подождите.',err:'Ошибка при регистрации.',ok:'✅ Регистрация успешна! Перенаправляем…'},
  kz:{ct:'Teen-ге тіркелу',cs:'13–18 жастағы жасөспірімдер үшін аккаунт жасаңыз',secPers:'🧑 Жеке деректер',secSchool:'🏫 Оқу',secAcc:'📧 Аккаунт',fname:'Толық аты-жөні',nick:'Лақап ат',age:'Жасы',phone:'Телефон',school:'Мектеп',cls:'Сынып',selSch:'Мектепті таңдаңыз',selCls:'Сыныпты таңдаңыз',email:'Email',pass:'Құпиясөз',pass2:'Құпиясөзді растаңыз',btn:'Тіркелу',haveAcc:'Аккаунт бар ма?',login:' Teen ретінде кіру',back:'← Артқа',errPw:'Құпиясөздер сәйкес емес.',errConsent:'Саясатқа келісіміңізді растаңыз.',errShort:'Құпиясөз кемінде 6 таңба.',errRate:'Тым көп әрекет. Күте тұрыңыз.',err:'Тіркелу қатесі.',ok:'✅ Тіркелу сәтті! Бағытталуда…'}
};

let lang = localStorage.getItem('selectedLanguage') || 'ru';
function setLang(l) {
  lang = l;
  localStorage.setItem('selectedLanguage', l);
  document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('on', b.dataset.l === l));
  const t = T[l];
  document.getElementById('ct').textContent = t.ct;
  document.getElementById('cs').textContent = t.cs;
  document.getElementById('secPers').textContent = t.secPers;
  document.getElementById('secSchool').textContent = t.secSchool;
  document.getElementById('secAcc').textContent = t.secAcc;
  document.getElementById('lFName').textContent = t.fname;
  document.getElementById('lNick').textContent = t.nick;
  document.getElementById('lAge').textContent = t.age;
  document.getElementById('lPhone').textContent = t.phone;
  document.getElementById('lSchool').textContent = t.school;
  document.getElementById('lClass').textContent = t.cls;
  document.getElementById('selSchool').textContent = t.selSch;
  document.getElementById('selClass').textContent = t.selCls;
  document.getElementById('lEmail').textContent = t.email;
  document.getElementById('lPass').textContent = t.pass;
  document.getElementById('lPass2').textContent = t.pass2;
  document.getElementById('bTxt').textContent = t.btn;
  document.getElementById('haveAcc').textContent = t.haveAcc;
  document.getElementById('loginLnk').textContent = t.login;
  document.getElementById('backA').textContent = t.back;
}
document.querySelectorAll('.lbtn').forEach(b => b.addEventListener('click', () => setLang(b.dataset.l)));
setLang(lang);

function togglePw(btn) {
  const inp = btn.previousElementSibling;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
function se(m){const e=document.getElementById('eMsg');e.textContent=m;e.style.display='block';document.getElementById('oMsg').style.display='none';e.scrollIntoView({behavior:'smooth',block:'nearest'});}
function so(m){const e=document.getElementById('oMsg');e.textContent=m;e.style.display='block';document.getElementById('eMsg').style.display='none';}

let submitting = false;
document.getElementById('regForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (submitting) return;
  const t = T[lang];
  const fd = new FormData(this);
  const fullName = String(fd.get('fullName') || '').trim();
  const nickname = String(fd.get('nickname') || '').trim();
  if ((fullName && containsProfanity(fullName)) || (nickname && containsProfanity(nickname))) {
    se(profanityMsg(lang));
    return;
  }
  const pass = fd.get('password'), pass2 = fd.get('confirm_password');
  if (pass.length < 6) { se(t.errShort); return; }
  if (pass !== pass2) { se(t.errPw); return; }
  if (!fd.get('terms')) { se(t.errConsent); return; }
  submitting = true;
  const btn = document.getElementById('sbtn');
  btn.classList.add('ld'); btn.disabled = true;
  document.getElementById('eMsg').style.display = 'none';
  try {
    await EcoBalaAuth.registerTeen({
      email: fd.get('email'),
      password: pass,
      fullName: fd.get('fullName'),
      nickname: fd.get('nickname'),
      age: Number(fd.get('age')),
      class: fd.get('class'),
      school: fd.get('school'),
      phone: fd.get('phone') || ''
    });
    so(t.ok);
    setTimeout(() => window.location.href = 'teen.html', 1000);
  } catch(err) {
    const msg = err && err.message ? err.message : '';
    se(msg.includes('rate') ? t.errRate : (msg || t.err));
    btn.classList.remove('ld'); btn.disabled = false;
    submitting = false;
  }
});
</script>
